name: Indeed Job Scraper

on:
  schedule:
    - cron: '0 10 * * *' # Rozana subah 10 baje chalega
  workflow_dispatch:      # Manual chalane ka button

permissions:
  contents: write         # Files save karne ki permission

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright pandas
          playwright install chromium

      - name: Run Scraper
        env:
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }} # GitHub Settings wala Secret
        run: python scraper.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add indeed_jobs.csv index.html
          git commit -m "Updated jobs dashboard" || echo "No changes to commit"
          git push
