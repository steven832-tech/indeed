<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indeed Job Dashboard</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 40px; 
            background: #f0f2f5; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { 
            color: #2557a7; 
            text-align: center; 
            margin-bottom: 30px;
        }
        /* Link styling for Apply button */
        a {
            text-decoration: none;
            background-color: #2557a7;
            color: white !important;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        a:hover { background-color: #1c3d7a; }
    </style>
</head>
<body>

    <h1>Indeed Remote Software Jobs Tracker</h1>
    
    <div class="container">
        <table id="jobsTable" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Date Found</th>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026-05-10</td>
                    <td>Software Developer</td>
                    <td>Example Tech</td>
                    <td><a href="#" target="_blank">Apply Now</a></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#jobsTable').DataTable({
                "pageLength": 25,
                "order": [[ 0, "desc" ]], // Newest jobs first
                "responsive": true
            });
        });
    </script>
</body>
</html>
